databaseChangeLog:
  - changeSet:
      id: 001-create-payments-table
      author: rzodeczko
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: saga_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: customer_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: payments
            columnNames: saga_id
            constraintName: uk_payment_saga
