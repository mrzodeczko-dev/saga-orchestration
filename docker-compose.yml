services:
  # --------------------------------------------------------------------------------------------------------------------
  # RABBITMQ - klaster 3-wezlowy
  # --------------------------------------------------------------------------------------------------------------------
  rabbitmq1:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
      args:
        RABBITMQ_VERSION: ${RABBITMQ_VERSION}
    container_name: saga-rabbitmq-1
    hostname: rabbitmq1
    ports:
      - "5672:5672"     # AMQP - polaczenia aplikacji
      - "15672:15672"   # Management UI - panel webowy
      - "15692:15692"   # Prometheus - metryki
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_ADMIN_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_ADMIN_PASS}
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_FORCE_BOOT: "false"
    volumes:
      - rabbitmq1-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 240s
    restart: unless-stopped
    networks:
      - saga-network

  rabbitmq2:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
      args:
        RABBITMQ_VERSION: ${RABBITMQ_VERSION}
    container_name: saga-rabbitmq-2
    hostname: rabbitmq2
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq2-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    depends_on:
      rabbitmq1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    networks:
      - saga-network

  rabbitmq3:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
      args:
        RABBITMQ_VERSION: ${RABBITMQ_VERSION}
    container_name: saga-rabbitmq-3
    hostname: rabbitmq3
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq3-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    depends_on:
      rabbitmq1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # BAZY DANYCH
  # --------------------------------------------------------------------------------------------------------------------
  booking-mysql:
    image: mysql:9.6.0
    restart: unless-stopped
    volumes:
      - booking-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${BOOKING_SERVICE_MYSQL_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${BOOKING_SERVICE_MYSQL_DB_NAME}
      MYSQL_USER: ${BOOKING_SERVICE_MYSQL_DB_USER}
      MYSQL_PASSWORD: ${BOOKING_SERVICE_MYSQL_DB_PASSWORD}
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=${BOOKING_SERVICE_MYSQL_INNODB_BUFFER_POOL_SIZE}
      --max-connections=${BOOKING_SERVICE_MYSQL_MAX_CONNECTIONS}
    ports:
      - '${BOOKING_SERVICE_MYSQL_DB_PORT}:3306'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e \"SELECT 1 FROM information_schema.schemata WHERE schema_name='$$MYSQL_DATABASE'\"" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - saga-network


  flight-mysql:
    image: mysql:9.6.0
    restart: unless-stopped
    volumes:
      - flight-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${FLIGHT_SERVICE_MYSQL_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${FLIGHT_SERVICE_MYSQL_DB_NAME}
      MYSQL_USER: ${FLIGHT_SERVICE_MYSQL_DB_USER}
      MYSQL_PASSWORD: ${FLIGHT_SERVICE_MYSQL_DB_PASSWORD}
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=${FLIGHT_SERVICE_MYSQL_INNODB_BUFFER_POOL_SIZE}
      --max-connections=${FLIGHT_SERVICE_MYSQL_MAX_CONNECTIONS}
    ports:
      - '${FLIGHT_SERVICE_MYSQL_DB_PORT}:3306'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e \"SELECT 1 FROM information_schema.schemata WHERE schema_name='$$MYSQL_DATABASE'\"" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - saga-network

  hotel-mysql:
    image: mysql:9.6.0
    restart: unless-stopped
    volumes:
      - hotel-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${HOTEL_SERVICE_MYSQL_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${HOTEL_SERVICE_MYSQL_DB_NAME}
      MYSQL_USER: ${HOTEL_SERVICE_MYSQL_DB_USER}
      MYSQL_PASSWORD: ${HOTEL_SERVICE_MYSQL_DB_PASSWORD}
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=${HOTEL_SERVICE_MYSQL_INNODB_BUFFER_POOL_SIZE}
      --max-connections=${HOTEL_SERVICE_MYSQL_MAX_CONNECTIONS}
    ports:
      - '${HOTEL_SERVICE_MYSQL_DB_PORT}:3306'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e \"SELECT 1 FROM information_schema.schemata WHERE schema_name='$$MYSQL_DATABASE'\"" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - saga-network

  payment-mysql:
    image: mysql:9.6.0
    restart: unless-stopped
    volumes:
      - payment-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${PAYMENT_SERVICE_MYSQL_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${PAYMENT_SERVICE_MYSQL_DB_NAME}
      MYSQL_USER: ${PAYMENT_SERVICE_MYSQL_DB_USER}
      MYSQL_PASSWORD: ${PAYMENT_SERVICE_MYSQL_DB_PASSWORD}
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=${PAYMENT_SERVICE_MYSQL_INNODB_BUFFER_POOL_SIZE}
      --max-connections=${PAYMENT_SERVICE_MYSQL_MAX_CONNECTIONS}
    ports:
      - '${PAYMENT_SERVICE_MYSQL_DB_PORT}:3306'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e \"SELECT 1 FROM information_schema.schemata WHERE schema_name='$$MYSQL_DATABASE'\"" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - saga-network


  # --------------------------------------------------------------------------------------------------------------------
  # SECURITY PLATFORM — USER MYSQL
  # --------------------------------------------------------------------------------------------------------------------
  user-mysql:
    image: mysql:9.6.0
    restart: unless-stopped
    volumes:
      - user-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${USER_SERVICE_MYSQL_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${USER_SERVICE_MYSQL_DB_NAME}
      MYSQL_USER: ${USER_SERVICE_MYSQL_DB_USER}
      MYSQL_PASSWORD: ${USER_SERVICE_MYSQL_DB_PASSWORD}
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=${USER_SERVICE_MYSQL_INNODB_BUFFER_POOL_SIZE}
      --max-connections=${USER_SERVICE_MYSQL_MAX_CONNECTIONS}
    expose:
      - "3306"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e \"SELECT 1 FROM information_schema.schemata WHERE schema_name='$$MYSQL_DATABASE'\"" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # SECURITY PLATFORM — AUTH REDIS
  # --------------------------------------------------------------------------------------------------------------------
  auth-redis:
    image: redis:8.2-alpine
    restart: unless-stopped
    command: >
      redis-server
      --bind 0.0.0.0
      --protected-mode yes
      --requirepass ${AUTH_REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - auth-redis-data:/data
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${AUTH_REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # SECURITY PLATFORM — USER SERVICE
  # --------------------------------------------------------------------------------------------------------------------
  user-service:
    image: mrzodeczko/security-platform-user-service:2026-06-29-v31
    restart: on-failure:5
    expose:
      - "8086"
    depends_on:
      user-mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:mysql://${USER_SERVICE_MYSQL_DB_HOST:-user-mysql}:3306/${USER_SERVICE_MYSQL_DB_NAME:-users_db}?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${USER_SERVICE_MYSQL_DB_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${USER_SERVICE_MYSQL_DB_PASSWORD}
      MAIL_HOST: ${USER_SERVICE_MAIL_HOST:-smtp.gmail.com}
      MAIL_USERNAME: ${USER_SERVICE_MAIL_USERNAME}
      MAIL_PASSWORD: ${USER_SERVICE_MAIL_PASSWORD}
      MAIL_PORT: ${USER_SERVICE_MAIL_PORT:-587}
      INTERNAL_SECRET: ${SECURITY_INTERNAL_SECRET}
      MFA_ISSUER: ${USER_SERVICE_MFA_ISSUER}
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # SECURITY PLATFORM — AUTH SERVICE
  # --------------------------------------------------------------------------------------------------------------------
  auth-service:
    image: mrzodeczko/security-platform-auth-service:2026-06-29-v31
    restart: on-failure:5
    expose:
      - "8084"
    depends_on:
      user-service:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
    environment:
      JWT_SECRET: ${SECURITY_JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${AUTH_JWT_ACCESS_TOKEN_EXPIRATION_MS:-300000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${AUTH_JWT_REFRESH_TOKEN_EXPIRATION_MS:-3000000}
      USER_SERVICE_URL: http://user-service:8086
      INTERNAL_SECRET: ${SECURITY_INTERNAL_SECRET}
      REDIS_HOST: ${AUTH_REDIS_HOST:-auth-redis}
      REDIS_PORT: ${AUTH_REDIS_PORT:-6379}
      REDIS_PASSWORD: ${AUTH_REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # SECURITY PLATFORM — API GATEWAY
  # --------------------------------------------------------------------------------------------------------------------
  api-gateway-service:
    image: mrzodeczko/security-platform-api-gateway-service:2026-06-29-v31
    restart: on-failure:5
    ports:
      - "${API_GATEWAY_SERVICE_PORT:-8085}:8085"
    depends_on:
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      booking-service:
        condition: service_started
    environment:
      JWT_SECRET: ${SECURITY_JWT_SECRET}
      INTERNAL_SECRET: ${SECURITY_INTERNAL_SECRET}
      AUTH_SERVICE_URL: http://auth-service:8084
      USER_SERVICE_URL: http://user-service:8086
      RATE_LIMIT_ENABLED: ${API_GATEWAY_RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_RPS: ${API_GATEWAY_RATE_LIMIT_RPS:-20}
      RATE_LIMIT_BURST: ${API_GATEWAY_RATE_LIMIT_BURST:-40}
      REDIS_HOST: ${AUTH_REDIS_HOST:-auth-redis}
      REDIS_PORT: ${AUTH_REDIS_PORT:-6379}
      REDIS_PASSWORD: ${AUTH_REDIS_PASSWORD}
      SPRINGDOC_ENABLED: ${SPRINGDOC_ENABLED:-false}
      # Routing — nadpisanie YAML przez env vars
      GATEWAY_ROUTES_0_PREFIX: /auth
      GATEWAY_ROUTES_0_TARGET: http://auth-service:8084
      GATEWAY_ROUTES_1_PREFIX: /users
      GATEWAY_ROUTES_1_TARGET: http://user-service:8086
      GATEWAY_ROUTES_2_PREFIX: /bookings
      GATEWAY_ROUTES_2_TARGET: http://booking-service:${BOOKING_SERVICE_PORT}
      # Public paths — auth/users endpoints (bookings NIE — wymagają JWT)
      GATEWAY_PUBLIC-PATHS_0: "POST:/auth/login"
      GATEWAY_PUBLIC-PATHS_1: "POST:/auth/refresh"
      GATEWAY_PUBLIC-PATHS_2: "POST:/auth/mfa"
      GATEWAY_PUBLIC-PATHS_3: "POST:/auth/logout"
      GATEWAY_PUBLIC-PATHS_4: "POST:/users"
      GATEWAY_PUBLIC-PATHS_5: "POST:/users/code"
      GATEWAY_PUBLIC-PATHS_6: "POST:/users/activation"
      GATEWAY_PUBLIC-PATHS_7: "POST:/users/password/permission"
      GATEWAY_PUBLIC-PATHS_8: "POST:/users/password/reset"
      GATEWAY_PUBLIC-PATHS_9: "GET:/"
      GATEWAY_PUBLIC-PATHS_10: "GET:/actuator/health"
      GATEWAY_PUBLIC-PATHS_11: "GET:/actuator/health/liveness"
      GATEWAY_PUBLIC-PATHS_12: "GET:/actuator/health/readiness"
      # Admin paths
      GATEWAY_ADMIN-PATHS_0: "PUT:/users/*/role"
      # User paths
      GATEWAY_USER-PATHS_0: "POST:/users/*/mfa"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # BOOKING SERVICE
  # --------------------------------------------------------------------------------------------------------------------
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    restart: on-failure:5
    expose:
      - "${BOOKING_SERVICE_PORT}"
    depends_on:
      booking-mysql:
        condition: service_healthy
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
    environment:
      SERVER_PORT: ${BOOKING_SERVICE_PORT}
      SPRING_APPLICATION_NAME: ${BOOKING_SERVICE_APPLICATION_NAME}
      SPRING_DATASOURCE_URL: jdbc:mysql://${BOOKING_SERVICE_MYSQL_DB_HOST}:3306/${BOOKING_SERVICE_MYSQL_DB_NAME}?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${BOOKING_SERVICE_MYSQL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${BOOKING_SERVICE_MYSQL_DB_PASSWORD}
      SPRING_RABBITMQ_ADDRESSES: ${SPRING_RABBITMQ_ADDRESSES}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${SPRING_RABBITMQ_VIRTUAL_HOST}
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # FLIGHT SERVICE
  # --------------------------------------------------------------------------------------------------------------------
  flight-service:
    build:
      context: .
      dockerfile: flight-service/Dockerfile
    restart: on-failure:5
    expose:
      - "${FLIGHT_SERVICE_PORT}"
    depends_on:
      flight-mysql:
        condition: service_healthy
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
    environment:
      SERVER_PORT: ${FLIGHT_SERVICE_PORT}
      SPRING_APPLICATION_NAME: ${FLIGHT_SERVICE_APPLICATION_NAME}
      SPRING_DATASOURCE_URL: jdbc:mysql://${FLIGHT_SERVICE_MYSQL_DB_HOST}:3306/${FLIGHT_SERVICE_MYSQL_DB_NAME}?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${FLIGHT_SERVICE_MYSQL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${FLIGHT_SERVICE_MYSQL_DB_PASSWORD}
      SPRING_RABBITMQ_ADDRESSES: ${SPRING_RABBITMQ_ADDRESSES}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${SPRING_RABBITMQ_VIRTUAL_HOST}
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # HOTEL SERVICE
  # --------------------------------------------------------------------------------------------------------------------
  hotel-service:
    build:
      context: .
      dockerfile: hotel-service/Dockerfile
    restart: on-failure:5
    expose:
      - "${HOTEL_SERVICE_PORT}"
    depends_on:
      hotel-mysql:
        condition: service_healthy
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
    environment:
      SERVER_PORT: ${HOTEL_SERVICE_PORT}
      SPRING_APPLICATION_NAME: ${HOTEL_SERVICE_APPLICATION_NAME}
      SPRING_DATASOURCE_URL: jdbc:mysql://${HOTEL_SERVICE_MYSQL_DB_HOST}:3306/${HOTEL_SERVICE_MYSQL_DB_NAME}?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${HOTEL_SERVICE_MYSQL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${HOTEL_SERVICE_MYSQL_DB_PASSWORD}
      SPRING_RABBITMQ_ADDRESSES: ${SPRING_RABBITMQ_ADDRESSES}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${SPRING_RABBITMQ_VIRTUAL_HOST}
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # PAYMENT SERVICE
  # --------------------------------------------------------------------------------------------------------------------
  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    restart: on-failure:5
    expose:
      - "${PAYMENT_SERVICE_PORT}"
    depends_on:
      payment-mysql:
        condition: service_healthy
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
    environment:
      SERVER_PORT: ${PAYMENT_SERVICE_PORT}
      SPRING_APPLICATION_NAME: ${PAYMENT_SERVICE_APPLICATION_NAME}
      SPRING_DATASOURCE_URL: jdbc:mysql://${PAYMENT_SERVICE_MYSQL_DB_HOST}:3306/${PAYMENT_SERVICE_MYSQL_DB_NAME}?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${PAYMENT_SERVICE_MYSQL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${PAYMENT_SERVICE_MYSQL_DB_PASSWORD}
      SPRING_RABBITMQ_ADDRESSES: ${SPRING_RABBITMQ_ADDRESSES}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${SPRING_RABBITMQ_VIRTUAL_HOST}
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - saga-network

