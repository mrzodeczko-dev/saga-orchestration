services:
  # --------------------------------------------------------------------------------------------------------------------
  # RABBITMQ - klaster 3-wezlowy
  # --------------------------------------------------------------------------------------------------------------------
  rabbitmq1:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
      args:
        RABBITMQ_VERSION: ${RABBITMQ_VERSION}
    container_name: saga-rabbitmq-1
    hostname: rabbitmq1
    ports:
      - "5672:5672"     # AMQP - polaczenia aplikacji
      - "15672:15672"   # Management UI - panel webowy
      - "15692:15692"   # Prometheus - metryki
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_ADMIN_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_ADMIN_PASS}
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_FORCE_BOOT: "false"
    volumes:
      - rabbitmq1-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 240s
    restart: unless-stopped
    networks:
      - saga-network

  rabbitmq2:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
      args:
        RABBITMQ_VERSION: ${RABBITMQ_VERSION}
    container_name: saga-rabbitmq-2
    hostname: rabbitmq2
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq2-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    depends_on:
      rabbitmq1:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    networks:
      - saga-network

  rabbitmq3:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
      args:
        RABBITMQ_VERSION: ${RABBITMQ_VERSION}
    container_name: saga-rabbitmq-3
    hostname: rabbitmq3
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE}
    volumes:
      - rabbitmq3-data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    depends_on:
      rabbitmq1:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_port_connectivity" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped
    networks:
      - saga-network


  # --------------------------------------------------------------------------------------------------------------------
  # BAZY DANYCH
  # --------------------------------------------------------------------------------------------------------------------
  booking-mysql:
    image: mysql:9.6.0
    restart: unless-stopped
    volumes:
      - booking-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${BOOKING_SERVICE_MYSQL_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${BOOKING_SERVICE_MYSQL_DB_NAME}
      MYSQL_USER: ${BOOKING_SERVICE_MYSQL_DB_USER}
      MYSQL_PASSWORD: ${BOOKING_SERVICE_MYSQL_DB_PASSWORD}
    command: >
      --default-time-zone='+00:00'
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=${BOOKING_SERVICE_MYSQL_INNODB_BUFFER_POOL_SIZE}
      --max-connections=${BOOKING_SERVICE_MYSQL_MAX_CONNECTIONS}
    ports:
      - '${BOOKING_SERVICE_MYSQL_DB_PORT}:3306'
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "mysql -h localhost -u $$MYSQL_USER -p$$MYSQL_PASSWORD -e \"SELECT 1 FROM information_schema.schemata WHERE schema_name='$$MYSQL_DATABASE'\"" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - saga-network

  # --------------------------------------------------------------------------------------------------------------------
  # BOOKING SERVICE
  # --------------------------------------------------------------------------------------------------------------------
  booking-service:
    build:
      context: ./booking-service
      dockerfile: Dockerfile
    restart: on-failure:5
    ports:
      - "${BOOKING_SERVICE_PORT}:${BOOKING_SERVICE_PORT}"
    depends_on:
      booking-mysql:
        condition: service_healthy
      rabbitmq1:
        condition: service_healthy
      rabbitmq2:
        condition: service_healthy
      rabbitmq3:
        condition: service_healthy
    environment:
      SERVER_PORT: ${BOOKING_SERVICE_PORT}
      SPRING_APPLICATION_NAME: ${BOOKING_SERVICE_APPLICATION_NAME}
      SPRING_DATASOURCE_URL: jdbc:mysql://${BOOKING_SERVICE_MYSQL_DB_HOST}:3306/${BOOKING_SERVICE_MYSQL_DB_NAME}?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${BOOKING_SERVICE_MYSQL_DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${BOOKING_SERVICE_MYSQL_DB_PASSWORD}
      SPRING_RABBITMQ_ADDRESSES: ${SPRING_RABBITMQ_ADDRESSES}
      SPRING_RABBITMQ_USERNAME: ${SPRING_RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${SPRING_RABBITMQ_PASSWORD}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${SPRING_RABBITMQ_VIRTUAL_HOST}
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - saga-network

volumes:
  rabbitmq1-data:
  rabbitmq2-data:
  rabbitmq3-data:
  booking-mysql:

networks:
  saga-network:
    driver: bridge     