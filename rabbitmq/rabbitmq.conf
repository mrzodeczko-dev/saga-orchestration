# Przy starcie brokera wczytaj użytkowniki, vhosty i uprawnienia z JSON
# Ścieżka w kontenerze = mount z docker-compose: definitions.json → /etc/rabbitmq/definitions.json
management.load_definitions = /etc/rabbitmq/definitions.json

# Gdy RAM brokera przekroczy 70% limitu kontenera → flow control (spowolnienie publisherów).
# Chroni przed OOM kill całego kontenera. 0.7 = bezpieczny default na dev.
vm_memory_high_watermark.relative = 0.7

# Minimum wolnego miejsca na dysku. Poniżej 1 GB broker odmawia przyjmowania wiadomości.
# Chroni przed zapisem na pełnym dysku (korupcja danych).
disk_free_limit.absolute = 1GB

# Logi na stdout → docker logs / agregator logów widzi je bez plików w kontenerze.
log.console = true
log.console.level = info

# Prometheus: metryki per kolejka/exchange (nie tylko globalne). Lepsze alerty w Grafana.
prometheus.return_per_object_metrics = true

# Domyślny typ nowych kolejek = quorum (replikowane w klastrze, majority ack).
# Kolejki Sagi (q.flight-service.commands itd.) dziedziczą to ustawienie.
# Quorum = HA: padł jeden węzeł, wiadomości nadal na pozostałych.
default_queue_type = quorum

# Formacja klastra: statyczna lista węzłów (classic_config), nie Kubernetes discovery.
cluster_formation.peer_discovery_backend = classic_config
# Nazwy Erlang node = rabbit@<hostname>. Hostname kontenera = rabbitmq1, rabbitmq2, rabbitmq3 (compose).
cluster_formation.classic_config.nodes.1 = rabbit@rabbitmq1
cluster_formation.classic_config.nodes.2 = rabbit@rabbitmq2
cluster_formation.classic_config.nodes.3 = rabbit@rabbitmq3

# Przy starcie: ile prób łączenia węzłów (10 × 3 s = ~30 s na uformowanie klastra).
cluster_formation.discovery_retry_limit = 10
cluster_formation.discovery_retry_interval = 3000