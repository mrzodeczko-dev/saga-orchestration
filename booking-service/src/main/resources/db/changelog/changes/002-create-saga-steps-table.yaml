databaseChangeLog:
  - changeSet:
      id: 002-create-saga-steps-table
      author: rzodeczko
      changes:
        - createTable:
            tableName: saga_steps
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: saga_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(24)
                  constraints:
                    nullable: false
              - column:
                  name: reason
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: saga_steps
            baseColumnNames: saga_id
            referencedTableName: saga_instances
            referencedColumnNames: id
            constraintName: fk_saga_steps_saga_id
