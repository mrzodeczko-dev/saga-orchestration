name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build-saga-common:
    name: saga-common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: saga-common/pom.xml

      - name: Set up Maven 3.9.9
        run: |
          wget -q https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz
          tar xf apache-maven-3.9.9-bin.tar.gz
          echo "$PWD/apache-maven-3.9.9/bin" >> $GITHUB_PATH

      - name: Build and install saga-common
        run: mvn -B -pl saga-common clean install

      - name: Cache saga-common in local Maven repo
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/com/rzodeczko/saga-common
          key: saga-common-${{ github.sha }}

  # --- Stub providers — flight, hotel, payment budują się równolegle i instalują stuby ---
  build-stub-providers:
    name: ${{ matrix.service }} (stubs provider)
    runs-on: ubuntu-latest
    needs: build-saga-common
    strategy:
      fail-fast: false
      matrix:
        service:
          - flight-service
          - hotel-service
          - payment-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: ${{ matrix.service }}/pom.xml

      - name: Set up Maven 3.9.9
        run: |
          wget -q https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz
          tar xf apache-maven-3.9.9-bin.tar.gz
          echo "$PWD/apache-maven-3.9.9/bin" >> $GITHUB_PATH

      - name: Restore saga-common
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/rzodeczko/saga-common
          key: saga-common-${{ github.sha }}

      - name: Build, test and install stubs
        run: mvn -B -pl ${{ matrix.service }} clean install

      - name: Cache stubs in local Maven repo
        uses: actions/cache/save@v4
        with:
          path: ~/.m2/repository/com/rzodeczko/${{ matrix.service }}
          key: ${{ matrix.service }}-stubs-${{ github.sha }}

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-${{ matrix.service }}
          path: ${{ matrix.service }}/target/site/jacoco/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/
          retention-days: 14

  # --- Booking-service zależy od stubów flight, hotel i payment ---
  build-booking-service:
    name: booking-service
    runs-on: ubuntu-latest
    needs: build-stub-providers
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: booking-service/pom.xml

      - name: Set up Maven 3.9.9
        run: |
          wget -q https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz
          tar xf apache-maven-3.9.9-bin.tar.gz
          echo "$PWD/apache-maven-3.9.9/bin" >> $GITHUB_PATH

      - name: Restore saga-common
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/rzodeczko/saga-common
          key: saga-common-${{ github.sha }}

      - name: Restore flight-service stubs
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/rzodeczko/flight-service
          key: flight-service-stubs-${{ github.sha }}

      - name: Restore hotel-service stubs
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/rzodeczko/hotel-service
          key: hotel-service-stubs-${{ github.sha }}

      - name: Restore payment-service stubs
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/rzodeczko/payment-service
          key: payment-service-stubs-${{ github.sha }}

      - name: Build and test
        run: mvn -B -pl booking-service clean verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report-booking-service
          path: booking-service/target/site/jacoco/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-booking-service
          path: booking-service/target/surefire-reports/
          retention-days: 14
