databaseChangeLog:
  - changeSet:
      id: 003-create-outbox-events-table
      author: rzodeczko
      changes:
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: exchange
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: routing_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME
                  constraints:
                    nullable: false
              - column:
                  name: published
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: DATETIME
              - column:
                  name: attempt_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: TEXT
