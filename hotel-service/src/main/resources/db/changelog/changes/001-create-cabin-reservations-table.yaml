databaseChangeLog:
  - changeSet:
      id: 001-create-cabin-reservations-table
      author: rzodeczko
      changes:
        - createTable:
            tableName: cabin_reservations
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: saga_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
              - column:
                  name: customer_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: destination
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(16)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: DATETIME(6)
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: cabin_reservations
            columnNames: saga_id
            constraintName: uk_cabin_reservation_saga
