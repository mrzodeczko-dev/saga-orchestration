databaseChangeLog:
  - changeSet:
      id: 002-create-processed-messages-table
      author: rzodeczko
      changes:
        - createTable:
            tableName: processed_messages
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_key
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: processed_at
                  type: DATETIME
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: processed_messages
            columnNames: message_key
            constraintName: uk_processed_message_key
